name: Publish OpenClaw Plugin

on:
  push:
    tags:
      - "openclaw-plugin-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openclaw-clawlink

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify trusted publishing npm version
        run: |
          npx --yes npm@11.6.2 --version

      - name: Verify package and manifest versions
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./openclaw.plugin.json').version")

          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match openclaw.plugin.json version ($MANIFEST_VERSION)"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#openclaw-plugin-v}"

            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
              exit 1
            fi
          fi

      - name: Inspect publish tarball
        run: npm pack --dry-run

      - name: Publish to npm
        run: npx --yes npm@11.6.2 publish --provenance --access public

      - name: Write ClawHub config
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_CLI_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          path = Path(os.environ["RUNNER_TEMP"]) / "clawhub-config.json"
          path.write_text(
              json.dumps({"registry": "https://clawhub.ai", "token": os.environ["CLAWHUB_TOKEN"]}, indent=2) + "\n",
              encoding="utf-8",
          )
          path.chmod(0o600)
          print(f"Config written to {path} (token length: {len(os.environ['CLAWHUB_TOKEN'])})")
          PY
          echo "CLAWHUB_CONFIG_PATH=$RUNNER_TEMP/clawhub-config.json" >> "$GITHUB_ENV"

      - name: Publish to ClawHub
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ github.workspace }}
        run: node scripts/publish-clawhub-plugin.mjs --commit "$GITHUB_SHA" --manual-override-reason "GitHub Actions tag publish via CLAWHUB_CLI_TOKEN"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
