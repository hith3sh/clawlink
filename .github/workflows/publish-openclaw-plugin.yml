name: Publish OpenClaw Plugin

on:
  push:
    tags:
      - "openclaw-plugin-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openclaw-clawlink

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify trusted publishing npm version
        run: |
          npx --yes npm@11.6.2 --version

      - name: Verify package and manifest versions
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./openclaw.plugin.json').version")

          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match openclaw.plugin.json version ($MANIFEST_VERSION)"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#openclaw-plugin-v}"

            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
              exit 1
            fi
          fi

      - name: Inspect publish tarball
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: npx --yes npm@11.6.2 publish --provenance --access public

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

  publish-clawhub:
    needs: publish
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.12.0
    with:
      dry_run: false
      source: "https://github.com/hith3sh/clawlink/tree/${{ github.ref_name }}/packages/openclaw-clawlink-clawhub"
      source_repo: hith3sh/clawlink
      source_commit: ${{ github.sha }}
      source_ref: ${{ github.ref }}
