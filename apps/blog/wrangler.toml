name = "clawlink-blog"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Assets (static files)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Custom domain
routes = [
  { pattern = "blog.claw-link.dev", custom_domain = true }
]

[vars]
NOTION_DATABASE_ID = ""
NOTION_API_KEY = ""
