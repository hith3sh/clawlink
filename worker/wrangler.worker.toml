name = "clawlink"
main = "index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[triggers]
crons = ["*/5 * * * *"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "clawlink"
database_id = "6a73a389-ebd4-46ee-9a3d-2d637831ed65"

# KV for credential cache
[[kv_namespaces]]
binding = "CREDENTIALS"
id = "82482703a83c4bc28af059eb092bd9a2"

# Environment variables
[vars]
ENV = "production"
CLAWLINK_APP_URL = "https://claw-link.dev"
NANGO_BASE_URL = "https://nango.claw-link.dev"
NANGO_PROVIDER_CONFIG_KEYS = "{\"google-analytics\":\"google-analytics\"}"
PIPEDREAM_ENVIRONMENT = "production"
PIPEDREAM_PROJECT_ID = "proj_gYspDxN"
PIPEDREAM_CONNECT_SLUGS = "slack,facebook,mailchimp,gmail,linkedin,outlook,xero,notion,apollo,postiz,google-analytics,google-search-console,google-calendar,google-docs,google-drive,google-sheets,youtube,clickup,hubspot,airtable,salesforce,calendly,onedrive,google-ads"
PIPEDREAM_APP_MAP = "apollo=apollo_io_oauth,xero=xero_accounting_api,airtable=airtable_oauth,salesforce=salesforce_rest_api,calendly=calendly_v2,onedrive=microsoft_onedrive,google-ads=google_ads,google-analytics=google_analytics,google-calendar=google_calendar,google-docs=google_docs,google-drive=google_drive,google-sheets=google_sheets,google-search-console=google_search_console,youtube=youtube_data_api"
COMPOSIO_BASE_URL = "https://backend.composio.dev/api/v3.1"
COMPOSIO_ENABLED_SLUGS = "instantly,outlook,apollo,postiz,gmail,google-search-console,google-docs,google-analytics,onedrive,google-ads,hubspot,google-calendar,klaviyo,airtable,calendly,clickup,mailchimp,notion,salesforce,xero,twilio"
COMPOSIO_TOOLKIT_MAP = "instantly=instantly,outlook=outlook,apollo=apollo,postiz=postiz_mcp,gmail=gmail,google-search-console=google_search_console,google-docs=googledocs,google-analytics=google_analytics,onedrive=one_drive,google-ads=googleads,hubspot=hubspot,google-calendar=googlecalendar,klaviyo=klaviyo,airtable=airtable,calendly=calendly,clickup=clickup,mailchimp=mailchimp,notion=notion,salesforce=salesforce,xero=xero,twilio=twilio"
