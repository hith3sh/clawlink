name = "clawlink-web"
compatibility_date = "2026-04-01"
main = ".open-next/worker.js"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true

[observability]
enabled = true

[[routes]]
pattern = "claw-link.dev"
custom_domain = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "clawlink-web"

# D1 Database (for Next.js API routes)
[[d1_databases]]
binding = "DB"
database_name = "clawlink"
database_id = "6a73a389-ebd4-46ee-9a3d-2d637831ed65"
remote = true

# KV for credential cache
[[kv_namespaces]]
binding = "CREDENTIALS"
id = "82482703a83c4bc28af059eb092bd9a2"
remote = true

