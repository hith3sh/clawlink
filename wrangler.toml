name = "clawlink-web"
compatibility_date = "2026-04-01"
main = ".open-next/worker.js"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true

[observability]
enabled = true

[[routes]]
pattern = "claw-link.dev"
custom_domain = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "clawlink-web"

# D1 Database (for Next.js API routes)
[[d1_databases]]
binding = "DB"
database_name = "clawlink"
database_id = "6a73a389-ebd4-46ee-9a3d-2d637831ed65"
remote = true

# KV for credential cache
[[kv_namespaces]]
binding = "CREDENTIALS"
id = "82482703a83c4bc28af059eb092bd9a2"
remote = true

# Environment variables
[vars]
ENV = "production"
NEXT_PUBLIC_API_URL = "https://api.claw-link.dev"
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsuY2xhdy1saW5rLmRldiQ"
NEXT_PUBLIC_CLERK_SIGN_IN_URL = "/sign-in"
NEXT_PUBLIC_CLERK_SIGN_UP_URL = "/sign-up"
NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/dashboard"
NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/dashboard"
NANGO_BASE_URL = "https://nango.claw-link.dev"
NEXT_PUBLIC_NANGO_BASE_URL = "https://connect.nango.claw-link.dev"
NANGO_PROVIDER_CONFIG_KEYS = "{\"apollo\":\"apollo\",\"google-analytics\":\"google-analytics\",\"postiz\":\"postiz\"}"
PIPEDREAM_ENVIRONMENT = "production"
PIPEDREAM_PROJECT_ID = "proj_gYspDxN"
PIPEDREAM_CONNECT_SLUGS = "slack,facebook,mailchimp,gmail,linkedin,outlook,xero,notion"
PIPEDREAM_APP_MAP = "facebook=facebook_pages,outlook=microsoft_outlook"
