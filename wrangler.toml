name = "clawlink"
main = "worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[observability]
enabled = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "clawlink"
database_id = "6a73a389-ebd4-46ee-9a3d-2d637831ed65"

# KV for credential cache
[[kv_namespaces]]
binding = "CREDENTIALS"
id = "82482703a83c4bc28af059eb092bd9a2"

# Environment variables
[vars]
ENV = "development"

# Clerk - set these via: wrangler secret put CLERK_SECRET_KEY
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is set in Cloudflare Pages settings