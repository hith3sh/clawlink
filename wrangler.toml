name = "clawlink-web"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[observability]
enabled = true

# D1 Database (for Next.js API routes)
[[d1_databases]]
binding = "DB"
database_name = "clawlink"
database_id = "6a73a389-ebd4-46ee-9a3d-2d637831ed65"
remote = true

# KV for credential cache
[[kv_namespaces]]
binding = "CREDENTIALS"
id = "82482703a83c4bc28af059eb092bd9a2"
remote = true

# Environment variables
[vars]
ENV = "production"
NEXT_PUBLIC_API_URL = "https://api.claw-link.dev"
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsuY2xhdy1saW5rLmRldiQ"
NEXT_PUBLIC_CLERK_SIGN_IN_URL = "/sign-in"
NEXT_PUBLIC_CLERK_SIGN_UP_URL = "/sign-up"
NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL = "/dashboard"
NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL = "/dashboard"
